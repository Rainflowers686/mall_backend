  /api/products/:
    get:
      operationId: products_list
      description: 商品列表接口（支持过滤、搜索、排序）
      parameters:
      - in: query
        name: category
        schema:
          type: integer
      - in: query
        name: is_hot
        schema:
          type: boolean
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - products
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - schema
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/token/refresh/:
    post:
      operationId: token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
components:
  schemas:
    Address:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        receiver:
          type: string
          title: 收件人
          maxLength: 20
        phone:
          type: string
          title: 手机号
          maxLength: 11
        province:
          type: string
          title: 省份
          maxLength: 20
        city:
          type: string
          title: 城市
          maxLength: 20
        district:
          type: string
          title: 区/县
          maxLength: 20
        detail:
          type: string
          title: 详细地址
          maxLength: 100
        is_default:
          type: boolean
          title: 是否默认
        user:
          type: integer
          readOnly: true
          title: 所属用户
      required:
      - city
      - detail
      - district
      - id
      - phone
      - province
      - receiver
      - user
    MessageTypeEnum:
      enum:
      - 1
      - 2
      - 3
      - 4
      type: integer
      description: |-
        * `1` - 留言
        * `2` - 投诉
        * `3` - 询问
        * `4` - 售后
    Order:
      type: object
      properties:
        address:
          type: string
          title: 收货详细地址
          maxLength: 100
        signer_name:
          type: string
          title: 签收人
          maxLength: 20
        signer_mobile:
          type: string
          title: 联系电话
          maxLength: 11
      required:
      - signer_mobile
    PatchedAddress:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        receiver:
          type: string
          title: 收件人
          maxLength: 20
        phone:
          type: string
          title: 手机号
          maxLength: 11
        province:
          type: string
          title: 省份
          maxLength: 20
        city:
          type: string
          title: 城市
          maxLength: 20
        district:
          type: string
          title: 区/县
          maxLength: 20
        detail:
          type: string
          title: 详细地址
          maxLength: 100
        is_default:
          type: boolean
          title: 是否默认
        user:
          type: integer
          readOnly: true
          title: 所属用户
    PatchedOrder:
      type: object
      properties:
        address:
          type: string
          title: 收货详细地址
          maxLength: 100
        signer_name:
          type: string
          title: 签收人
          maxLength: 20
        signer_mobile:
          type: string
          title: 联系电话
          maxLength: 11
    PatchedShoppingCart:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: integer
          title: 商品
        nums:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: 购买数量
        is_selected:
          type: boolean
          title: 是否勾选
        product_name:
          type: string
          readOnly: true
        product_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        product_image:
          type: string
          format: uri
          readOnly: true
    PatchedUserMessage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        message_type:
          allOf:
          - $ref: '#/components/schemas/MessageTypeEnum'
          title: 留言类型
          minimum: -2147483648
          maximum: 2147483647
        subject:
          type: string
          title: 主题
          maxLength: 100
        message:
          type: string
          title: 留言内容
        add_time:
          type: string
          format: date-time
          readOnly: true
          title: 留言时间
        user:
          type: integer
          readOnly: true
          title: 留言用户
    Product:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        category_name:
          type: string
          readOnly: true
        name:
          type: string
          title: 商品名称
          maxLength: 100
        description:
          type: string
          title: 规格描述
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          title: 价格
        stock:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: 库存显示
        image:
          type: string
          format: uri
          nullable: true
          title: 商品图
        is_hot:
          type: boolean
          title: 是否热门推荐
        category:
          type: integer
          title: 所属分类
      required:
      - category
      - category_name
      - description
      - id
      - name
      - price
    ShoppingCart:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: integer
          title: 商品
        nums:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          title: 购买数量
        is_selected:
          type: boolean
          title: 是否勾选
        product_name:
          type: string
          readOnly: true
        product_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        product_image:
          type: string
          format: uri
          readOnly: true
      required:
      - id
      - product
      - product_image
      - product_name
      - product_price
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    UserMessage:
      type: object
      properties:
        id:
